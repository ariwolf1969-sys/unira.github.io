<iframe width="80%" height="400"

<p>
Una cooperativa es una organización donde todos los miembros son dueños.<br><br>

No hay un jefe que se lleve todo.<br>
Las decisiones se toman en conjunto.<br>
El dinero queda dentro del grupo.
</p>
